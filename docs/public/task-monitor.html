<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>服务器任务调度监控大屏</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background-color: #f7f8f9;
      color: #2c3e50;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1600px;
      margin: 0 auto;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(107, 144, 128, 0.15);
    }

    h1 {
      color: #6b9080;
      font-size: 2rem;
      font-weight: 600;
    }

    .datetime {
      font-size: 1.2rem;
      color: #666;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: #fff;
      padding: 24px;
      border-radius: 12px;
      border-left: 4px solid #6b9080;
      box-shadow: 0 4px 12px rgba(107, 144, 128, 0.08);
      text-align: center;
      transition: transform 0.2s;
    }

    .stat-card:hover {
      transform: translateY(-4px);
    }

    .stat-value {
      font-size: 2.5rem;
      font-weight: bold;
      color: #6b9080;
      margin-bottom: 8px;
    }

    .stat-label {
      font-size: 1rem;
      color: #888;
    }

    .content-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 30px;
    }

    .panel {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 12px rgba(107, 144, 128, 0.08);
      overflow: hidden;
    }

    .panel-header {
      background-color: #6b9080;
      color: #fff;
      padding: 16px 24px;
      font-size: 1.2rem;
      font-weight: 500;
    }

    .panel-body {
      padding: 20px;
      max-height: 500px;
      overflow-y: auto;
    }

    .task-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      border-bottom: 1px solid rgba(107, 144, 128, 0.1);
    }

    .task-item:last-child {
      border-bottom: none;
    }

    .task-info {
      flex: 1;
    }

    .task-name {
      font-size: 1.1rem;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .task-time {
      font-size: 0.85rem;
      color: #888;
    }

    .status-badge {
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 500;
    }

    .status-running {
      background-color: #6b9080;
      color: #fff;
    }

    .status-pending {
      background-color: #f39c12;
      color: #fff;
    }

    .status-success {
      background-color: #27ae60;
      color: #fff;
    }

    .status-failed {
      background-color: #e74c3c;
      color: #fff;
    }

    .system-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .system-card {
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 12px rgba(107, 144, 128, 0.08);
    }

    .system-card h3 {
      color: #6b9080;
      margin-bottom: 16px;
      font-size: 1.1rem;
    }

    .progress-bar {
      width: 100%;
      height: 24px;
      background-color: #eee;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #6b9080 0%, #a7c5bd 100%);
      border-radius: 12px;
      text-align: right;
      padding-right: 8px;
      line-height: 24px;
      color: #fff;
      font-size: 0.8rem;
      font-weight: 500;
      transition: width 1s ease;
    }

    .percent-text {
      text-align: right;
      font-size: 0.9rem;
      color: #666;
    }

    .refresh-info {
      text-align: center;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid rgba(107, 144, 128, 0.15);
      color: #888;
      font-size: 0.9rem;
    }

    @media (max-width: 1024px) {
      .stats-row {
        grid-template-columns: repeat(2, 1fr);
      }
      .content-row {
        grid-template-columns: 1fr;
      }
      .system-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🖥️ 服务器任务调度监控</h1>
      <div class="datetime" id="datetime"></div>
    </header>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-value" id="total-tasks">0</div>
        <div class="stat-label">总任务数</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="running-tasks">0</div>
        <div class="stat-label">运行中</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="pending-tasks">0</div>
        <div class="stat-label">等待中</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="completed-today">0</div>
        <div class="stat-label">今日完成</div>
      </div>
    </div>

    <div class="content-row">
      <div class="panel">
        <div class="panel-header">🔄 正在运行</div>
        <div class="panel-body" id="running-list"></div>
      </div>
      <div class="panel">
        <div class="panel-header">⏳ 等待执行</div>
        <div class="panel-body" id="pending-list"></div>
      </div>
    </div>

    <div class="content-row">
      <div class="panel">
        <div class="panel-header">✅ 最近完成</div>
        <div class="panel-body" id="completed-list"></div>
      </div>
      <div class="panel">
        <div class="panel-header">📊 系统资源</div>
        <div class="panel-body">
          <div class="system-row">
            <div class="system-card">
              <h3>CPU 使用率</h3>
              <div class="progress-bar">
                <div class="progress-fill" id="cpu-progress" style="width: 0%">0%</div>
              </div>
              <div class="percent-text" id="cpu-text">0%</div>
            </div>
            <div class="system-card">
              <h3>内存使用率</h3>
              <div class="progress-bar">
                <div class="progress-fill" id="mem-progress" style="width: 0%">0%</div>
              </div>
              <div class="percent-text" id="mem-text">0%</div>
            </div>
            <div class="system-card">
              <h3>磁盘使用率</h3>
              <div class="progress-bar">
                <div class="progress-fill" id="disk-progress" style="width: 0%">0%</div>
              </div>
              <div class="percent-text" id="disk-text">0%</div>
            </div>
          </div>
          <div class="refresh-info">
            自动刷新间隔：<span id="refresh-interval">30</span> 秒<br>
            上次刷新：<span id="last-refresh">-</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // === 模拟数据（实际使用时可以替换成你的 API 接口）===
    // 如果你有后端接口，把 fetchData 改成调用你的接口就行
    // 接口返回格式：
    // {
    //   stats: { total: number, running: number, pending: number, completedToday: number },
    //   running: [{name: string, nextRun: string, status: 'running'}],
    //   pending: [{name: string, nextRun: string, status: 'pending'}],
    //   completed: [{name: string, finishTime: string, status: 'success'|'failed'}],
    //   system: { cpu: number, memory: number, disk: number }
    // }

    // 模拟数据生成
    function generateMockData() {
      const taskNames = [
        'GitHub Pages 自动部署', '博客构建', '数据库备份', '日志清理', 
        'SSL证书更新', '系统更新检查', '数据同步到OSS', '监控数据上报',
        '新闻爬虫', '文章索引更新', '病毒扫描', '备份归档',
        'npm 依赖更新', '缓存清理', '访问统计汇总', '域名证书检查'
      ];

      const statuses = ['success', 'success', 'success', 'failed'];
      
      // 随机几个运行中
      const runningCount = Math.floor(Math.random() * 4) + 1;
      const running = [];
      for (let i = 0; i < runningCount; i++) {
        const idx = Math.floor(Math.random() * taskNames.length);
        running.push({
          name: taskNames[idx],
          nextRun: nextRunTime(60 + Math.floor(Math.random() * 60)),
          status: 'running'
        });
        taskNames.splice(idx, 1);
      }

      // 随机几个等待中
      const pendingCount = Math.floor(Math.random() * 6) + 2;
      const pending = [];
      for (let i = 0; i < pendingCount; i++) {
        if (taskNames.length === 0) break;
        const idx = Math.floor(Math.random() * taskNames.length);
        pending.push({
          name: taskNames[idx],
          nextRun: nextRunTime(Math.floor(Math.random() * 120) + 1),
          status: 'pending'
        });
        taskNames.splice(idx, 1);
      }

      // 最近完成
      const completedCount = Math.floor(Math.random() * 8) + 3;
      const completed = [];
      for (let i = 0; i < completedCount; i++) {
        if (taskNames.length === 0) break;
        const idx = Math.floor(Math.random() * taskNames.length);
        const status = statuses[Math.floor(Math.random() * statuses.length)];
        completed.push({
          name: taskNames[idx],
          finishTime: finishedAgo(Math.floor(Math.random() * 120)),
          status: status
        });
        taskNames.splice(idx, 1);
      }

      const total = running.length + pending.length + completed.length + 8; // 加上固定任务
      const completedToday = completed.length + 10;

      return {
        stats: {
          total: total,
          running: running.length,
          pending: pending.length,
          completedToday: completedToday
        },
        running: running,
        pending: pending,
        completed: completed,
        system: {
          cpu: Math.floor(Math.random() * 80) + 10,
          memory: Math.floor(Math.random() * 70) + 20,
          disk: Math.floor(Math.random() * 60) + 30
        }
      };
    }

    function nextRunTime(minutesLater) {
      const date = new Date();
      date.setMinutes(date.getMinutes() + minutesLater);
      return `${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`;
    }

    function finishedAgo(minutesAgo) {
      const date = new Date();
      date.setMinutes(date.getMinutes() - minutesAgo);
      return `${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`;
    }

    // === 渲染函数 ===
    function updateDateTime() {
      const now = new Date();
      const datetimeStr = now.toLocaleString('zh-CN', { 
        year: 'numeric', month: '2-digit', day: '2-digit', 
        hour: '2-digit', minute: '2-digit', second: '2-digit' 
      });
      document.getElementById('datetime').textContent = datetimeStr;
    }

    function renderStats(stats) {
      document.getElementById('total-tasks').textContent = stats.total;
      document.getElementById('running-tasks').textContent = stats.running;
      document.getElementById('pending-tasks').textContent = stats.pending;
      document.getElementById('completed-today').textContent = stats.completedToday;
    }

    function renderTaskList(containerId, tasks) {
      const container = document.getElementById(containerId);
      container.innerHTML = '';
      if (tasks.length === 0) {
        container.innerHTML = '<p style="color: #888; text-align: center; padding: 20px;">暂无任务</p>';
        return;
      }
      tasks.forEach(task => {
        const item = document.createElement('div');
        item.className = 'task-item';
        item.innerHTML = `
          <div class="task-info">
            <div class="task-name">${task.name}</div>
            <div class="task-time">${task.nextRun || task.finishTime}</div>
          </div>
          <span class="status-badge status-${task.status}">${statusText(task.status)}</span>
        `;
        container.appendChild(item);
      });
    }

    function statusText(status) {
      const map = {
        running: '运行中',
        pending: '等待中',
        success: '成功',
        failed: '失败'
      };
      return map[status];
    }

    function renderSystem(system) {
      updateProgress('cpu-progress', 'cpu-text', system.cpu);
      updateProgress('mem-progress', 'mem-text', system.memory);
      updateProgress('disk-progress', 'disk-text', system.disk);
    }

    function updateProgress(progressId, textId, value) {
      const progress = document.getElementById(progressId);
      const text = document.getElementById(textId);
      progress.style.width = value + '%';
      progress.textContent = value + '%';
      text.textContent = value + '%';
    }

    // === 主刷新函数 ===
    function refreshData() {
      // 如果有真实接口，这里换成：
      // fetch('/your-api/tasks')
      //   .then(res => res.json())
      //   .then(data => {
      //          render all...
      //   })

      const data = generateMockData();
      renderStats(data.stats);
      renderTaskList('running-list', data.running);
      renderTaskList('pending-list', data.pending);
      renderTaskList('completed-list', data.completed);
      renderSystem(data.system);

      const now = new Date();
      document.getElementById('last-refresh').textContent = now.toLocaleTimeString('zh-CN');
    }

    // === 初始化 ===
    updateDateTime();
    refreshData();

    // 定时刷新
    const REFRESH_INTERVAL = 30 * 1000; // 30秒刷新一次
    setInterval(() => {
      updateDateTime();
      refreshData();
    }, REFRESH_INTERVAL);

    // 点击也能手动刷新
    // document.addEventListener('click', refreshData);
  </script>
</body>
</html>
